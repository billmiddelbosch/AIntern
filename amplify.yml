version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
        - mkdir -p .amplify-hosting/compute/default .amplify-hosting/static
        - node --input-type=module -e "import{build}from'esbuild';await build({entryPoints:['server.ts'],bundle:false,platform:'node',format:'esm',outfile:'.amplify-hosting/compute/default/server.js'})"
        - npm ci --omit=dev --cache .npm --prefer-offline
        - cp -r dist/client/. .amplify-hosting/static/
        - cp -r dist .amplify-hosting/compute/default/dist
        - cp -r node_modules .amplify-hosting/compute/default/node_modules
        - cp package.json .amplify-hosting/compute/default/package.json
        - node --input-type=module -e "import fs from 'fs';fs.writeFileSync('.amplify-hosting/deploy-manifest.json',JSON.stringify({version:1,routes:[{path:'/assets/*',target:{kind:'Static'}},{path:'/*',target:{kind:'Compute',src:'default'}}],computeResources:[{name:'default',entrypoint:'server.js',runtime:'nodejs20.x'}]},null,2))"
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*

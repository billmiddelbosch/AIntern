version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
        - npm ci --omit=dev --cache .npm --prefer-offline
  artifacts:
    baseDirectory: .
    files:
      - dist/**/*
      - server.ts
      - server.d.ts
      - node_modules/**/*
      - package.json
      - package-lock.json
  cache:
    paths:
      - .npm/**/*
